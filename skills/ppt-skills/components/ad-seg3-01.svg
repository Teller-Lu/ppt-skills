<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="adBg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#F7FBFE"/><stop offset="1" stop-color="#EAF4FD"/>
    </linearGradient>
    <radialGradient id="adAtm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58AAEC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#58AAEC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="adAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#146DB4"/><stop offset="1" stop-color="#14319C"/>
    </linearGradient>
    <radialGradient id="adCard" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#1C7FD0"/><stop offset="1" stop-color="#14319C"/>
    </radialGradient>
    <filter id="adShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="o"/>
      <feFlood flood-color="#146DB4" flood-opacity="0.18"/>
      <feComposite in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="url(#adBg)"/>
  <g id="bg-decoration">
    <circle cx="1120" cy="120" r="320" fill="url(#adAtm)"/>
    <circle cx="160" cy="650" r="280" fill="url(#adAtm)"/>
  </g>
  <g id="header">
    <text data-slot="page_title" x="84" y="78" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="40" font-weight="bold" fill="#222A35">页面标题</text>
    <rect x="84" y="92" width="120" height="6" rx="3" fill="url(#adAccent)"/>
  </g>
  <!-- 3 渐变卡:克制蓝投影 + 白底真图标圆 + 标签 + 2 行描述(卡内) -->
  <g id="card-1">
    <rect x="120" y="210" width="320" height="320" rx="22" fill="url(#adCard)" filter="url(#adShadow)"/>
    <circle cx="280" cy="292" r="42" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/target" x="252" y="264" width="56" height="56" fill="#146DB4"/>
    <text data-slot="card1_label" x="280" y="380" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">要点一</text>
    <text data-slot="card1_desc" x="280" y="434" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="18" fill="#DCEBFB">
      <tspan x="280" dy="0">描述文字第一行,</tspan>
      <tspan x="280" dy="28">第二行收在卡内。</tspan>
    </text>
  </g>
  <g id="card-2">
    <rect x="480" y="210" width="320" height="320" rx="22" fill="url(#adCard)" filter="url(#adShadow)"/>
    <circle cx="640" cy="292" r="42" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/bulb" x="612" y="264" width="56" height="56" fill="#146DB4"/>
    <text data-slot="card2_label" x="640" y="380" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">要点二</text>
    <text data-slot="card2_desc" x="640" y="434" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="18" fill="#DCEBFB">
      <tspan x="640" dy="0">描述文字第一行,</tspan>
      <tspan x="640" dy="28">第二行收在卡内。</tspan>
    </text>
  </g>
  <g id="card-3">
    <rect x="840" y="210" width="320" height="320" rx="22" fill="url(#adCard)" filter="url(#adShadow)"/>
    <circle cx="1000" cy="292" r="42" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/checklist" x="972" y="264" width="56" height="56" fill="#146DB4"/>
    <text data-slot="card3_label" x="1000" y="380" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">要点三</text>
    <text data-slot="card3_desc" x="1000" y="434" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="18" fill="#DCEBFB">
      <tspan x="1000" dy="0">描述文字第一行,</tspan>
      <tspan x="1000" dy="28">第二行收在卡内。</tspan>
    </text>
  </g>
</svg>
