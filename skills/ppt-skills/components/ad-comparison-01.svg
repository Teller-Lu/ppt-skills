<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="adBg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#F7FBFE"/><stop offset="1" stop-color="#EAF4FD"/>
    </linearGradient>
    <radialGradient id="adAtm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58AAEC" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#58AAEC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="adAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#146DB4"/><stop offset="1" stop-color="#14319C"/>
    </linearGradient>
    <radialGradient id="deepDisc" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#1B5E92"/><stop offset="1" stop-color="#0F2E6B"/>
    </radialGradient>
    <radialGradient id="brightDisc" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#58AAEC"/><stop offset="1" stop-color="#146DB4"/>
    </radialGradient>
    <filter id="adShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="o"/>
      <feFlood flood-color="#146DB4" flood-opacity="0.18"/>
      <feComposite in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="tri" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#146DB4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="url(#adBg)"/>
  <g id="bg-decoration">
    <circle cx="1130" cy="130" r="300" fill="url(#adAtm)"/>
    <circle cx="150" cy="640" r="260" fill="url(#adAtm)"/>
  </g>
  <g id="bg-ghost-rings">
    <circle cx="660" cy="376" r="250" fill="none" stroke="#146DB4" stroke-opacity="0.08" stroke-width="1.5"/>
    <circle cx="660" cy="376" r="192" fill="none" stroke="#146DB4" stroke-opacity="0.06" stroke-width="1.5"/>
    <circle cx="660" cy="376" r="134" fill="none" stroke="#58AAEC" stroke-opacity="0.10" stroke-width="1.5"/>
  </g>
  <g id="header">
    <text data-slot="page_title" x="84" y="78" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="40" font-weight="bold" fill="#222A35">页面标题</text>
    <rect x="84" y="92" width="120" height="6" rx="3" fill="url(#adAccent)"/>
  </g>
  <!-- 左栏:双色标题 + 正文 -->
  <g id="col-left">
    <text data-slot="left_head_1" x="96" y="208" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="bold" fill="#146DB4">主题一</text>
    <text data-slot="left_head_2" x="96" y="250" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="bold" fill="#222A35">不足之处</text>
    <text data-slot="left_para_1" x="96" y="312" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="17" fill="#44546A"><tspan x="96" dy="0">第一条要点的简要说明,</tspan><tspan x="96" dy="26">控制在两行以内收住。</tspan></text>
    <text data-slot="left_para_2" x="96" y="404" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="17" fill="#44546A"><tspan x="96" dy="0">第二条要点的简要说明,</tspan><tspan x="96" dy="26">控制在两行以内收住。</tspan></text>
    <text data-slot="left_para_3" x="96" y="496" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="17" fill="#44546A"><tspan x="96" dy="0">第三条要点的简要说明,</tspan><tspan x="96" dy="26">控制在两行以内收住。</tspan></text>
  </g>
  <!-- 中央:深盘 → 三角箭头 → 亮盘 -->
  <g id="pivot">
    <circle cx="572" cy="376" r="64" fill="url(#deepDisc)" filter="url(#adShadow)"/>
    <use data-icon="tabler-outline/file-search" x="544" y="348" width="56" height="56" fill="#FFFFFF"/>
    <line x1="648" y1="376" x2="684" y2="376" stroke="#146DB4" stroke-width="4" marker-end="url(#tri)"/>
    <circle cx="748" cy="376" r="64" fill="url(#brightDisc)" filter="url(#adShadow)"/>
    <use data-icon="tabler-outline/bulb" x="720" y="348" width="56" height="56" fill="#FFFFFF"/>
  </g>
  <!-- 右栏:双色标题 + 正文 -->
  <g id="col-right">
    <text data-slot="right_head_1" x="884" y="208" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="bold" fill="#146DB4">主题二</text>
    <text data-slot="right_head_2" x="884" y="250" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="bold" fill="#222A35">改善方法</text>
    <text data-slot="right_para_1" x="884" y="312" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="17" fill="#44546A"><tspan x="884" dy="0">改善方向的简要说明,</tspan><tspan x="884" dy="26">控制在两行以内收住。</tspan></text>
    <text data-slot="right_para_2" x="884" y="404" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="17" fill="#44546A"><tspan x="884" dy="0">改善方向的简要说明,</tspan><tspan x="884" dy="26">控制在两行以内收住。</tspan></text>
  </g>
</svg>
