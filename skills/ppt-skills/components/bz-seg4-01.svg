<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bzBg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#F7FBFF"/><stop offset="1" stop-color="#E9F1FC"/>
    </linearGradient>
    <radialGradient id="bzAtm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#59B0FF" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#59B0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bzAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#079FFE"/><stop offset="1" stop-color="#54CCFF"/>
    </linearGradient>
    <linearGradient id="bzHexGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#36B6FF"/><stop offset="1" stop-color="#0A5FD4"/>
    </linearGradient>
    <filter id="bzShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="o"/>
      <feFlood flood-color="#1C5BB0" flood-opacity="0.17"/>
      <feComposite in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bzBg)"/>
  <g id="bg-decoration">
    <circle cx="1160" cy="120" r="290" fill="url(#bzAtm)"/>
    <circle cx="120" cy="640" r="250" fill="url(#bzAtm)"/>
    <polygon points="300,360 480,67 800,67 980,360 800,653 480,653" fill="none" stroke="#079FFE" stroke-opacity="0.16" stroke-width="1.5"/>
    <polygon points="395,360 520,143 760,143 885,360 760,577 520,577" fill="none" stroke="#54CCFF" stroke-opacity="0.14" stroke-width="1.5"/>
  </g>

  <g id="header">
    <text data-slot="page_title" x="76" y="74" font-family="'Microsoft YaHei','HarmonyOS Sans SC',sans-serif" font-size="34" font-weight="bold" fill="#1F2733">痛点分析</text>
    <rect x="76" y="92" width="120" height="6" rx="3" fill="url(#bzAccent)"/>
  </g>

  <!-- 卫星六边形 01 数据(左外,标签在下) -->
  <g id="sat-01">
    <polygon points="158,360 194,298 266,298 302,360 266,422 194,422" fill="#FFFFFF" stroke="#BBD9F5" stroke-width="1.5" filter="url(#bzShadow)"/>
    <use data-icon="tabler-outline/database" x="207" y="337" width="46" height="46" fill="#0A66DD"/>
    <text x="230" y="466" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="22" font-weight="bold" fill="#079FFE">01</text>
    <text data-slot="sat1_label" x="230" y="496" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="18" fill="#1F2733">
      <tspan x="230" dy="0">数据不规范</tspan><tspan x="230" dy="26">存在误删风险</tspan>
    </text>
  </g>
  <!-- 卫星六边形 02 动力(左内,标签在上) -->
  <g id="sat-02">
    <polygon points="358,432 394,370 466,370 502,432 466,494 394,494" fill="#FFFFFF" stroke="#BBD9F5" stroke-width="1.5" filter="url(#bzShadow)"/>
    <use data-icon="tabler-outline/network" x="407" y="409" width="46" height="46" fill="#0A66DD"/>
    <text x="430" y="300" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="22" font-weight="bold" fill="#079FFE">02</text>
    <text data-slot="sat2_label" x="430" y="330" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="18" fill="#1F2733">
      <tspan x="430" dy="0">不被重视</tspan><tspan x="430" dy="26">治理动力不足</tspan>
    </text>
  </g>
  <!-- 中心六边形 link -->
  <g id="hub">
    <polygon points="558,358 599,287 681,287 722,358 681,429 599,429" fill="url(#bzHexGrad)" filter="url(#bzShadow)"/>
    <use data-icon="tabler-outline/link" x="608" y="326" width="64" height="64" fill="#FFFFFF"/>
  </g>
  <!-- 卫星六边形 03 周期(右内,标签在上) -->
  <g id="sat-03">
    <polygon points="778,432 814,370 886,370 922,432 886,494 814,494" fill="#FFFFFF" stroke="#BBD9F5" stroke-width="1.5" filter="url(#bzShadow)"/>
    <use data-icon="tabler-outline/refresh" x="827" y="409" width="46" height="46" fill="#0A66DD"/>
    <text x="850" y="300" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="22" font-weight="bold" fill="#079FFE">03</text>
    <text data-slot="sat3_label" x="850" y="330" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="18" fill="#1F2733">
      <tspan x="850" dy="0">治理非闭环</tspan><tspan x="850" dy="26">周期性催促治理</tspan>
    </text>
  </g>
  <!-- 卫星六边形 04 指标(右外,标签在下) -->
  <g id="sat-04">
    <polygon points="978,360 1014,298 1086,298 1122,360 1086,422 1014,422" fill="#FFFFFF" stroke="#BBD9F5" stroke-width="1.5" filter="url(#bzShadow)"/>
    <use data-icon="tabler-outline/chart-bar" x="1027" y="337" width="46" height="46" fill="#0A66DD"/>
    <text x="1050" y="466" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="22" font-weight="bold" fill="#079FFE">04</text>
    <text data-slot="sat4_label" x="1050" y="496" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="18" fill="#1F2733">
      <tspan x="1050" dy="0">治理效果量化</tspan><tspan x="1050" dy="26">指标粗糙</tspan>
    </text>
  </g>
</svg>
