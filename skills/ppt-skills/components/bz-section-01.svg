<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bzBg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#F4F9FF"/><stop offset="1" stop-color="#E2EEFB"/>
    </linearGradient>
    <radialGradient id="bzAtm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7FC0FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7FC0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bzAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#079FFE"/><stop offset="1" stop-color="#54CCFF"/>
    </linearGradient>
    <!-- 城市剪影:顶亮→底深竖向渐变(逐楼映射) -->
    <linearGradient id="bzCity" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5793DC"/><stop offset="1" stop-color="#0E327A"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bzBg)"/>
  <g id="bg-decoration">
    <circle cx="1010" cy="180" r="320" fill="url(#bzAtm)"/>
    <circle cx="150" cy="600" r="240" fill="url(#bzAtm)"/>
  </g>

  <!-- 巨大渐变大编号(烘焙 PNG 保浅蓝→深蓝;先画 → 被城市遮住脚=景深) -->
  <image data-slot="section_number_image" xlink:href="bz-section-01.assets/n01.png" href="bz-section-01.assets/n01.png" x="667" y="120" width="466" height="312"/>

  <!-- 城市天际线(多层景深 + 地标高塔 + 窗线;盖住编号下缘;装饰出血到底边) -->
  <g id="skyline-decor">
    <!-- 远层(浅) -->
    <g fill="url(#bzCity)" opacity="0.30">
      <rect x="0" y="560" width="72" height="160"/>
      <rect x="120" y="535" width="58" height="185"/>
      <rect x="250" y="508" width="80" height="212"/>
      <rect x="370" y="545" width="62" height="175"/>
      <rect x="480" y="515" width="74" height="205"/>
      <rect x="610" y="548" width="58" height="172"/>
      <rect x="730" y="505" width="70" height="215"/>
      <rect x="980" y="500" width="74" height="220"/>
      <rect x="1140" y="520" width="80" height="200"/>
      <rect x="1232" y="545" width="48" height="175"/>
    </g>
    <!-- 中层 -->
    <g fill="url(#bzCity)" opacity="0.48">
      <rect x="40" y="600" width="66" height="120"/>
      <rect x="160" y="560" width="72" height="160"/>
      <rect x="300" y="585" width="58" height="135"/>
      <rect x="420" y="545" width="80" height="175"/>
      <rect x="560" y="572" width="64" height="148"/>
      <rect x="660" y="548" width="70" height="172"/>
      <rect x="790" y="470" width="58" height="250"/>
      <rect x="1030" y="505" width="64" height="215"/>
      <rect x="1130" y="556" width="72" height="164"/>
      <rect x="1210" y="585" width="70" height="135"/>
    </g>
    <!-- 地标高塔(盖住"01"下缘) + 天线 -->
    <rect x="746" y="378" width="5" height="22" fill="#0E327A" opacity="0.6"/>
    <rect x="906" y="334" width="6" height="30" fill="#0E327A" opacity="0.6"/>
    <rect x="1032" y="382" width="5" height="24" fill="#0E327A" opacity="0.6"/>
    <g fill="url(#bzCity)" opacity="0.66">
      <rect x="712" y="398" width="74" height="322"/>
      <rect x="864" y="362" width="92" height="358"/>
      <rect x="1000" y="404" width="72" height="316"/>
    </g>
    <!-- 高塔窗线/竖框(stroke-opacity) -->
    <g stroke="#FFFFFF" stroke-width="2.2" stroke-opacity="0.16">
      <line x1="712" y1="436" x2="786" y2="436"/><line x1="712" y1="476" x2="786" y2="476"/><line x1="712" y1="516" x2="786" y2="516"/><line x1="712" y1="556" x2="786" y2="556"/><line x1="712" y1="596" x2="786" y2="596"/>
      <line x1="749" y1="402" x2="749" y2="710"/>
      <line x1="864" y1="398" x2="956" y2="398"/><line x1="864" y1="438" x2="956" y2="438"/><line x1="864" y1="478" x2="956" y2="478"/><line x1="864" y1="518" x2="956" y2="518"/><line x1="864" y1="558" x2="956" y2="558"/><line x1="864" y1="598" x2="956" y2="598"/>
      <line x1="894" y1="366" x2="894" y2="710"/><line x1="926" y1="366" x2="926" y2="710"/>
      <line x1="1000" y1="442" x2="1072" y2="442"/><line x1="1000" y1="482" x2="1072" y2="482"/><line x1="1000" y1="522" x2="1072" y2="522"/><line x1="1000" y1="562" x2="1072" y2="562"/><line x1="1000" y1="602" x2="1072" y2="602"/>
      <line x1="1036" y1="408" x2="1036" y2="710"/>
    </g>
  </g>

  <!-- 左侧文字区 -->
  <g id="title-block" font-family="'Microsoft YaHei','HarmonyOS Sans SC',sans-serif">
    <rect x="64" y="150" width="190" height="54" rx="27" fill="url(#bzAccent)"/>
    <text data-slot="part_label" x="159" y="184" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF">PART ONE</text>

    <text data-slot="section_title" x="64" y="284" font-size="54" font-weight="bold" fill="#1F2733">经济环境分析</text>
    <rect x="66" y="306" width="132" height="7" rx="3.5" fill="url(#bzAccent)"/>
    <text data-slot="section_title_en" x="66" y="342" font-size="16" fill="#98A0AC" letter-spacing="3">ANALYSIS OF THE ECONOMIC ENVIRONMENT</text>
  </g>
</svg>
