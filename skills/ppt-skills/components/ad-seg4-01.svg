    <text data-slot="card2_label" x="491" y="372" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">要点二</text>
    <text data-slot="card2_desc" x="491" y="420" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="17" fill="#DCEBFB"><tspan x="491" dy="0">简要说明文字,</tspan><tspan x="491" dy="26">两行内收住。</tspan></text>
  </g>
  <g id="card-3">
    <rect x="666" y="206" width="246" height="304" rx="18" fill="url(#adCard)" filter="url(#adShadow)"/>
    <circle cx="789" cy="290" r="36" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/microscope" x="763" y="264" width="52" height="52" fill="#146DB4"/>
    <text data-slot="card3_label" x="789" y="372" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">要点三</text>
    <text data-slot="card3_desc" x="789" y="420" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="17" fill="#DCEBFB"><tspan x="789" dy="0">简要说明文字,</tspan><tspan x="789" dy="26">两行内收住。</tspan></text>
  </g>
  <g id="card-4">
