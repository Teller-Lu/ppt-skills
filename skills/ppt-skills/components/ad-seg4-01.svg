    <circle cx="1087" cy="290" r="36" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/award" x="1061" y="264" width="52" height="52" fill="#146DB4"/>
    <text data-slot="card4_label" x="1087" y="372" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">要点四</text>
    <text data-slot="card4_desc" x="1087" y="420" text-anchor="middle" font-family="'HarmonyOS Sans SC','Microsoft YaHei',sans-serif" font-size="17" fill="#DCEBFB"><tspan x="1087" dy="0">简要说明文字,</tspan><tspan x="1087" dy="26">两行内收住。</tspan></text>
  </g>
</svg>
