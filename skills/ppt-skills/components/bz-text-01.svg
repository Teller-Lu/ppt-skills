<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bzBg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#F7FBFF"/><stop offset="1" stop-color="#E9F1FC"/>
    </linearGradient>
    <radialGradient id="bzAtm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#59B0FF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#59B0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bzAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#079FFE"/><stop offset="1" stop-color="#54CCFF"/>
    </linearGradient>
    <radialGradient id="bzIconDisc" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#3CC0FF"/><stop offset="1" stop-color="#0A66DD"/>
    </radialGradient>
    <filter id="bzCard" x="-15%" y="-15%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="o"/>
      <feFlood flood-color="#1C5BB0" flood-opacity="0.13"/>
      <feComposite in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bzBg)"/>
  <g id="bg-decoration">
    <circle cx="1160" cy="120" r="280" fill="url(#bzAtm)"/>
    <circle cx="120" cy="650" r="240" fill="url(#bzAtm)"/>
  </g>

  <g id="header">
    <circle cx="90" cy="66" r="20" fill="url(#bzIconDisc)"/>
    <use data-icon="tabler-outline/building-skyscraper" x="76" y="52" width="28" height="28" fill="#FFFFFF"/>
    <text data-slot="page_title" x="124" y="76" font-family="'Microsoft YaHei','HarmonyOS Sans SC',sans-serif" font-size="34" font-weight="bold" fill="#1F2733">企业数字化转型整体概述</text>
    <rect x="124" y="92" width="150" height="6" rx="3" fill="url(#bzAccent)"/>
  </g>

  <!-- 主卡片 -->
  <rect x="64" y="150" width="1152" height="470" rx="18" fill="#FFFFFF" filter="url(#bzCard)"/>

  <!-- 左视觉轨:幽灵环 + 图标圆盘 + 说明 -->
  <g id="visual-rail" font-family="'Microsoft YaHei',sans-serif">
    <circle cx="270" cy="338" r="108" fill="none" stroke="#ACD2F2" stroke-width="1.5" stroke-opacity="0.55"/>
    <circle cx="270" cy="338" r="78" fill="none" stroke="#ACD2F2" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="270" cy="338" r="56" fill="url(#bzIconDisc)"/>
    <use data-icon="tabler-outline/building-skyscraper" x="242" y="310" width="56" height="56" fill="#FFFFFF"/>
    <rect x="235" y="470" width="70" height="4" rx="2" fill="url(#bzAccent)"/>
    <text x="270" y="500" font-size="16" fill="#5C636E" text-anchor="middle">数字化战略蓝图</text>
  </g>
  <line x1="500" y1="208" x2="500" y2="562" stroke="#E6ECF5" stroke-width="1.5"/>

  <!-- 右文字区:眉标 + 引导句 + 整段正文 + 关键词 -->
  <g id="text-zone" font-family="'Microsoft YaHei','HarmonyOS Sans SC',sans-serif">
    <rect x="540" y="212" width="42" height="5" rx="2.5" fill="url(#bzAccent)"/>
    <text data-slot="eyebrow" x="592" y="226" font-size="15" font-weight="bold" fill="#079FFE" letter-spacing="2">OVERVIEW · 概述</text>

    <text data-slot="lead" x="540" y="298" font-size="26" font-weight="bold" fill="#1F2733">以数据为核心驱动力,重构企业业务全链路。</text>

    <g fill="#5C636E" font-size="17">
      <text data-slot="p_line1" x="540" y="352">面向产业互联网的新阶段,企业需打通研发、生产、营销与服务</text>
      <text data-slot="p_line2" x="540" y="394">各环节的数据壁垒,构建统一的数字化中台与智能决策体系;</text>
      <text data-slot="p_line3" x="540" y="436">通过沉淀业务数据资产、引入 AI 辅助分析,持续提升运营效率</text>
      <text data-slot="p_line4" x="540" y="478">与用户体验,最终形成可复制、可扩展的数字化增长飞轮。</text>
    </g>

    <g id="keyword-pills" font-size="16" font-weight="bold" fill="#045FD4">
      <rect x="540" y="525" width="150" height="46" rx="23" fill="#EAF2FD"/>
      <circle cx="566" cy="548" r="5" fill="url(#bzAccent)"/>
      <text data-slot="tag1" x="582" y="554">数据中台</text>
      <rect x="706" y="525" width="150" height="46" rx="23" fill="#EAF2FD"/>
      <circle cx="732" cy="548" r="5" fill="url(#bzAccent)"/>
      <text data-slot="tag2" x="748" y="554">智能决策</text>
      <rect x="872" y="525" width="150" height="46" rx="23" fill="#EAF2FD"/>
      <circle cx="898" cy="548" r="5" fill="url(#bzAccent)"/>
      <text data-slot="tag3" x="914" y="554">增长飞轮</text>
    </g>
  </g>
</svg>
