<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bzBg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#F4F9FF"/><stop offset="1" stop-color="#E2EEFB"/>
    </linearGradient>
    <radialGradient id="bzAtm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7FC0FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7FC0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bzAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#079FFE"/><stop offset="1" stop-color="#54CCFF"/>
    </linearGradient>
    <radialGradient id="bzAvatar" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#E6F3FF"/><stop offset="1" stop-color="#C4E0F7"/>
    </radialGradient>
    <filter id="bzCard" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="o"/>
      <feFlood flood-color="#1C5BB0" flood-opacity="0.12"/>
      <feComposite in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bzBg)"/>
  <g id="bg-decoration">
    <circle cx="1080" cy="140" r="300" fill="url(#bzAtm)"/>
    <circle cx="160" cy="600" r="240" fill="url(#bzAtm)"/>
  </g>

  <text id="watermark" x="640" y="120" text-anchor="middle" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="72" font-weight="bold" fill="#D8E5F5" letter-spacing="10">CORE MEMBER</text>
  <text data-slot="page_title" x="640" y="74" text-anchor="middle" font-family="'Microsoft YaHei','HarmonyOS Sans SC',sans-serif" font-size="30" font-weight="bold" fill="#1F2733">团队成员介绍</text>

  <!-- 4 张成员卡(zigzag 错位) -->
  <g id="members" font-family="'Microsoft YaHei','HarmonyOS Sans SC',sans-serif">
    <!-- 卡1 -->
    <g id="m1">
      <rect x="108" y="150" width="248" height="420" rx="18" fill="#FFFFFF" filter="url(#bzCard)"/>
      <circle cx="232" cy="250" r="68" fill="none" stroke="#ACD2F2" stroke-width="2"/>
      <circle data-slot="photo_1" cx="232" cy="250" r="56" fill="url(#bzAvatar)"/>
      <use data-icon="tabler-outline/user" x="206" y="224" width="52" height="52" fill="#2E86E0"/>
      <text data-slot="name_1" x="232" y="360" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2733">张 伟</text>
      <text data-slot="role_1" x="232" y="392" text-anchor="middle" font-size="18" fill="#045FD4">技术总监</text>
      <rect x="216" y="410" width="32" height="3" rx="1.5" fill="url(#bzAccent)"/>
      <text data-slot="desc_1a" x="232" y="444" text-anchor="middle" font-size="15" fill="#98A0AC">负责技术创新和</text>
      <text data-slot="desc_1b" x="232" y="468" text-anchor="middle" font-size="15" fill="#98A0AC">产品开发</text>
    </g>
    <!-- 卡2 -->
    <g id="m2">
      <rect x="380" y="110" width="248" height="420" rx="18" fill="#FFFFFF" filter="url(#bzCard)"/>
      <circle cx="504" cy="210" r="68" fill="none" stroke="#ACD2F2" stroke-width="2"/>
      <circle data-slot="photo_2" cx="504" cy="210" r="56" fill="url(#bzAvatar)"/>
      <use data-icon="tabler-outline/user" x="478" y="184" width="52" height="52" fill="#2E86E0"/>
      <text data-slot="name_2" x="504" y="320" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2733">李丽弦</text>
      <text data-slot="role_2" x="504" y="352" text-anchor="middle" font-size="18" fill="#045FD4">运营总监</text>
      <rect x="488" y="370" width="32" height="3" rx="1.5" fill="url(#bzAccent)"/>
      <text data-slot="desc_2a" x="504" y="404" text-anchor="middle" font-size="15" fill="#98A0AC">管理公司运营</text>
      <text data-slot="desc_2b" x="504" y="428" text-anchor="middle" font-size="15" fill="#98A0AC">和提高效率</text>
    </g>
    <!-- 卡3 -->
    <g id="m3">
      <rect x="652" y="150" width="248" height="420" rx="18" fill="#FFFFFF" filter="url(#bzCard)"/>
      <circle cx="776" cy="250" r="68" fill="none" stroke="#ACD2F2" stroke-width="2"/>
      <circle data-slot="photo_3" cx="776" cy="250" r="56" fill="url(#bzAvatar)"/>
      <use data-icon="tabler-outline/user" x="750" y="224" width="52" height="52" fill="#2E86E0"/>
      <text data-slot="name_3" x="776" y="360" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2733">刘子昂</text>
      <text data-slot="role_3" x="776" y="392" text-anchor="middle" font-size="18" fill="#045FD4">财务总监</text>
      <rect x="760" y="410" width="32" height="3" rx="1.5" fill="url(#bzAccent)"/>
      <text data-slot="desc_3a" x="776" y="444" text-anchor="middle" font-size="15" fill="#98A0AC">监管财务状况</text>
      <text data-slot="desc_3b" x="776" y="468" text-anchor="middle" font-size="15" fill="#98A0AC">和预算规划</text>
    </g>
    <!-- 卡4 -->
    <g id="m4">
      <rect x="924" y="110" width="248" height="420" rx="18" fill="#FFFFFF" filter="url(#bzCard)"/>
      <circle cx="1048" cy="210" r="68" fill="none" stroke="#ACD2F2" stroke-width="2"/>
      <circle data-slot="photo_4" cx="1048" cy="210" r="56" fill="url(#bzAvatar)"/>
      <use data-icon="tabler-outline/user" x="1022" y="184" width="52" height="52" fill="#2E86E0"/>
      <text data-slot="name_4" x="1048" y="320" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2733">赵 敏</text>
      <text data-slot="role_4" x="1048" y="352" text-anchor="middle" font-size="18" fill="#045FD4">市场总监</text>
      <rect x="1032" y="370" width="32" height="3" rx="1.5" fill="url(#bzAccent)"/>
      <text data-slot="desc_4a" x="1048" y="404" text-anchor="middle" font-size="15" fill="#98A0AC">制定市场策略</text>
      <text data-slot="desc_4b" x="1048" y="428" text-anchor="middle" font-size="15" fill="#98A0AC">和品牌推广</text>
    </g>
  </g>
</svg>
